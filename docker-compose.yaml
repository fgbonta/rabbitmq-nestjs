version: '3'

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbit-mq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=test
      - RABBITMQ_DEFAULT_PASS=test123
    volumes:
      - ./rabbitmq_data:/var/lib/rabbitmq
    restart: always
