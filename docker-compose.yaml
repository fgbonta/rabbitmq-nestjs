version: '3'

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbit-mq
    ports:
      - ${RABBITMQ_PORT}:5672
      - ${RABBITMQ_PORT_MANAGEMENT}:15672
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD}
    volumes:
      - ./rabbitmq_data:/var/lib/rabbitmq
    restart: always
